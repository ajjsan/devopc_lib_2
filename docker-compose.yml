services:
  db:
    image: postgres:16-alpine
    container_name: twitter-sentiment-pg
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Задай POSTGRES_USER в .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Задай POSTGRES_PASSWORD в .env}
      POSTGRES_DB: ${POSTGRES_DB:?Задай POSTGRES_DB в .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: mle-template-api:latest
    container_name: twitter-sentiment-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "-m", "uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

volumes:
  pgdata:
